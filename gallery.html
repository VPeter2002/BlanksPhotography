<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galériák | Blank's Photography</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>
<body class="gallery-page">

    <nav id="main-nav">
        <a href="index.html" class="logo">Blank's <span>Photography</span></a>
        <ul>
            <li><a href="index.html">Kezdőlap</a></li>
            <li><a href="gallery.html" class="active">Galéria</a></li>
            <li><a href="index.html#contact">Kapcsolat</a></li>
        </ul>
    </nav>

    <main class="section">
        <h1 class="section-title">Portfólió</h1>
        
        <div class="category-grid">
            <!-- Esküvő kategória -->
            <a href="wedding-gallery.html" class="category-card">
                <div class="category-image" style="background-image: url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=800&q=80')"></div>
                <div class="category-info">
                    <h3>Esküvők</h3>
                    <p>Az érzelmek és a nagy nap pillanatai</p>
                </div>
            </a>

            <!-- Portré kategória -->
            <a href="portrait-gallery.html" class="category-card">
                <div class="category-image" style="background-image: url('https://images.unsplash.com/photo-1531746020798-e7953e3e8c5c?auto=format&fit=crop&w=800&q=80')"></div>
                <div class="category-info">
                    <h3>Portrék</h3>
                    <p>Egyéniség és karakter minden képen</p>
                </div>
            </a>

            <!-- Divat/Esemény kategória -->
            <a href="event-gallery.html" class="category-card">
                <div class="category-image" style="background-image: url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=800&q=80')"></div>
                <div class="category-info">
                    <h3>Események</h3>
                    <p>Koncertek, partik és céges rendezvények</p>
                </div>
            </a>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
