    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
    // --- SUPABASE KAPCSOLÓDÁS ---
    const supabaseUrl = 'https://lyagqwuqzurkkvcnjqtg.supabase.co';
    // IDE MÁSOLD BE AZ API MENÜPONTBÓL A HOSSZÚ KÓDOT:
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5YWdxd3VxenVya2t2Y25qcXRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MDE2NzIsImV4cCI6MjA5NTQ3NzY3Mn0.tuoGksKYjjiaohdTaNt_vvnY1mB9IUpoQC3cAqA9-tU'; 
    
    const bucketName = 'Blanka pics'; // A frissített vödör neved
    const folderName = 'arnikaeszsolt_jegyes';            

    // A JAVÍTÁS: supabaseClient névre kereszteltük a változót
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    // Lightbox elemek kijelölése
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxCaption = document.getElementById('lightbox-caption');
    const closeBtn = document.querySelector('.lightbox-close');
    const prevBtn = document.querySelector('.lightbox-prev');
    const nextBtn = document.querySelector('.lightbox-next');

    // Képek adatait tároló tömb és aktuális index
    let kepekLista = [];
    let aktualisIndex = 0;

    // Képek automatikus lekérése és megjelenítése
    async function betoltKepek() {
        const grid = document.getElementById('photo-container');
        console.log("Megpróbálom lekérni a képeket a Supabase-ből...");

        const { data, error } = await supabaseClient.storage.from(bucketName).list(folderName, {
            limit: 200,
            sortBy: { column: 'name', order: 'asc' }
        });

        if (error) {
            console.error('Hiba a Supabase lekérés során:', error);
            grid.innerHTML = '<p style="text-align:center; color:#888;">Sajnos nem sikerült betölteni a képeket.</p>';
            return;
        }

        console.log("Talált képek száma:", data.length);
        kepekLista = []; // Lista ürítése újratöltés esetén

        data.forEach(file => {
            // Csak a képfájlokat jelenítjük meg
            if (file.name.endsWith('.jpg') || file.name.endsWith('.png') || file.name.endsWith('.webp') || file.name.endsWith('.jpeg')) {
                
                const filePath = folderName ? `${folderName}/${file.name}` : file.name;
                
                // Itt is supabaseClient-et használunk
                const { data: publicUrlData } = supabaseClient.storage.from(bucketName).getPublicUrl(filePath);
                const imageUrl = publicUrlData.publicUrl;

                // Kép adatainak elmentése a listába
                const kepIndex = kepekLista.length;
                kepekLista.push({ url: imageUrl, nev: file.name });

                // HTML elem létrehozása
                const item = document.createElement('div');
                item.className = 'subphoto-item';
                item.innerHTML = `<img src="${imageUrl}" alt="Jegyes pillanat – ${file.name}" loading="lazy">`;
                
                // Kattintás esemény hozzáadása a Lightboxhoz
                item.addEventListener('click', () => {
                    mutatKepet(kepIndex);
                    lightbox.classList.add('lightbox-active');
                    document.body.style.overflow = 'hidden';
                });

                grid.appendChild(item);
            }
        });
    }

    // Kép megjelenítése a sorszám alapján
    function mutatKepet(index) {
        if (kepekLista.length === 0) return;

        // Végtelenített lapozás logikája
        if (index < 0) {
            aktualisIndex = kepekLista.length - 1;
        } else if (index >= kepekLista.length) {
            aktualisIndex = 0;
        } else {
            aktualisIndex = index;
        }

        const aktKep = kepekLista[aktualisIndex];
        lightboxImg.src = aktKep.url;
        lightboxCaption.innerText = "Jegyes pillanat";
    }

    // Navigációs gombok eseménykezelői
    prevBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // Ne záródjon be a lightbox, ha rákattintunk a nyílra
        mutatKepet(aktualisIndex - 1);
    });

    nextBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // Ne záródjon be a lightbox, ha rákattintunk a nyílra
        mutatKepet(aktualisIndex + 1);
    });

    // Lightbox bezárás események
    closeBtn.addEventListener('click', () => {
        lightbox.classList.remove('lightbox-active');
        document.body.style.overflow = 'auto';
    });

    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) {
            lightbox.classList.remove('lightbox-active');
            document.body.style.overflow = 'auto';
        }
    });

    // Oldal indulásakor futtatás
    document.addEventListener('DOMContentLoaded', betoltKepek);
</script>
    
    <script src="script.js"></script>
</body>
